<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Student Details Form</h1>

    <form id="studentForm">

        <label>Name</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label>Age</label>
        <input type="number" id="age" placeholder="Enter your age">

        <label>Address</label>
        <textarea id="address" rows="4" placeholder="Enter your address"></textarea>

        <label>Pincode</label>
        <input type="text" id="pincode" placeholder="Enter 6-digit pincode">

        <label>Mobile Number</label>
        <input type="text" id="mobile" placeholder="Enter 10-digit mobile number">

        <label>Email Address</label>
        <input type="text" id="email" placeholder="Enter email address">

        <label>Upload Photo</label>
        <input type="file" id="photo" accept="image/*">

        <img id="preview" width="120" style="display:none; margin-top:10px; border-radius:10px;">

        <button type="submit">Submit</button>

    </form>

    <p id="message"></p>

</div>

<script src="script.js"></script>

</body>
</html>
