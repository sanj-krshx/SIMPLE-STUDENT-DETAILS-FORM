<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Student Details Form</h1>

    <form id="studentForm">

        <label for="name">👤 Name:</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label for="dob">🎂 Date of Birth:</label>
        <input type="date" id="dob">

        <label for="address">🏠 Address:</label>
        <textarea id="address" placeholder="Enter your address"></textarea>

        <label for="pincode">📮 Pincode:</label>
        <input type="text" id="pincode" placeholder="Enter your pincode">

        <label for="mobile">📱 Mobile Number:</label>
        <input type="tel" id="mobile" placeholder="Enter your mobile number">

        <label for="email">📧 Email Address:</label>
        <input type="email" id="email" placeholder="Enter your email address">

        <label for="photo">📷 Upload Photo:</label>
        <input type="file" id="photo" accept="image/*">

        <img id="preview" width="120" style="display:none; margin-top:10px; border-radius:10px;">

        <button type="submit">Submit</button>

    </form>

    <p id="message"></p>

</div>

<script src="script.js"></script>

</body>
</html>
